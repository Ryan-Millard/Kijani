; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32

[env]
framework = arduino

[env:esp32]
; platform = espressif32
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip

;If you had the problem before with the new 3.3.8 framework run the below to remove some wrong stuf and reset, 
;rm -rf /home/plakkies/.platformio/packages/framework-arduinoespressif32

platform_packages =
    ; framework-arduinoespressif32 @ 3.3.8
	framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#3.3.8
; platform_packages = 
;     platformio/framework-arduinoespressif32 @ https://github.com
;     platformio/framework-arduinoespressif32-libs @ https://github.com
lib_deps = 
	bblanchon/ArduinoJson@^6.18.1
	end2endzone/NonBlockingRTTTL@^1.3.0
	madhephaestus/ESP32Servo@^3.0.6
	ESP32Async/AsyncTCP
    ESP32Async/ESPAsyncWebServer
board = esp32dev
; monitor_filters = esp32_exception_decoder
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = partions.csv
extra_scripts = pre:littlefsbuilder.py
; build_flags = 
; 	-D CONFIG_ESP_INT_WDT_TIMEOUT_MS=5000
