<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Battle Bot Control</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            background: #101010;
            color: white;
            font-family: Arial;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }

        h1 {
            text-align: center;
            margin-top: 10px;
            margin-bottom: 5px;
        }

        .topbar {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .statusCard {
            background: #1f1f1f;
            border-radius: 10px;
            padding: 10px 16px;
            min-width: 120px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.4);
        }

        .statusTitle {
            color: #aaa;
            font-size: 14px;
        }

        .statusValue {
            font-size: 24px;
            font-weight: bold;
            margin-top: 5px;
        }

        .main {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: calc(100vh - 140px);
            padding: 10px;
            box-sizing: border-box;
        }

        .joystickArea {
            width: 320px;
            height: 320px;
            background: #1f1f1f;
            border-radius: 50%;
            position: relative;
            touch-action: none;
        }

        .joystickKnob {
            width: 110px;
            height: 110px;
            background: #555;
            border-radius: 50%;
            position: absolute;
            left: 105px;
            top: 105px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .controls {
            width: 300px;
        }

        .card {
            background: #1f1f1f;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .label {
            margin-top: 10px;
            margin-bottom: 5px;
        }

        input[type=range] {
            width: 100%;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }

        .stopBtn {
            background: red;
            color: white;
        }

        .boostBtn {
            background: orange;
            color: black;
        }
    </style>
</head>

<body>

<h1>🤖 Battle Bot Control</h1>

<div class="topbar">

    <div class="statusCard">
        <div class="statusTitle">Battery</div>
        <div class="statusValue" id="battery">--</div>
    </div>

    <div class="statusCard">
        <div class="statusTitle">Temperature</div>
        <div class="statusValue" id="temp">--</div>
    </div>

    <div class="statusCard">
        <div class="statusTitle">Status</div>
        <div class="statusValue" id="charge">--</div>
    </div>

</div>

<div class="main">

    <!-- JOYSTICK -->
    <div class="joystickArea" id="joystick">
        <div class="joystickKnob" id="knob"></div>
    </div>

    <!-- CONTROLS -->
    <div class="controls">

        <div class="card">
            <h3>Servo Controls</h3>

            <div class="label">Servo 1</div>
            <input type="range" min="0" max="180" value="90"
                   id="s1"
                   oninput="setServo('S1', this.value)">

            <div class="label">Servo 2</div>
            <input type="range" min="0" max="180" value="90"
                   id="s2"
                   oninput="setServo('S2', this.value)">
        </div>

        <div class="card">

            <button class="boostBtn" onclick="boost()">
                ⚡ BOOST
            </button>

            <button class="stopBtn" onclick="stopAll()">
                🛑 STOP
            </button>

        </div>

    </div>

</div>

<script>

const joystick = document.getElementById('joystick');
const knob = document.getElementById('knob');

const centerX = 160;
const centerY = 160;
const maxDistance = 110;

let dragging = false;

function sendControl(m1, m2) {

    fetch(`/processcontrol?M1=${m1}&M2=${m2}`)
        .catch(err => console.log(err));
}

function setServo(id, val) {

    fetch(`/processcontrol?${id}=${val}`)
        .catch(err => console.log(err));
}

function stopAll() {

    sendControl(0,0);

    knob.style.left = '105px';
    knob.style.top = '105px';
}

function boost() {

    sendControl(255,255);

    setTimeout(() => {
        sendControl(0,0);
    }, 500);
}

function handleMove(clientX, clientY) {

    const rect = joystick.getBoundingClientRect();

    let x = clientX - rect.left - centerX;
    let y = clientY - rect.top - centerY;

    const distance = Math.sqrt(x*x + y*y);

    if (distance > maxDistance) {

        x = x / distance * maxDistance;
        y = y / distance * maxDistance;
    }

    knob.style.left = (x + centerX - 55) + 'px';
    knob.style.top = (y + centerY - 55) + 'px';

    // Tank mixing
    let forward = -y / maxDistance;
    let turn = x / maxDistance;

    let m1 = (forward + turn) * 255;
    let m2 = (forward - turn) * 255;

    m1 = Math.round(Math.max(-255, Math.min(255, m1)));
    m2 = Math.round(Math.max(-255, Math.min(255, m2)));

    sendControl(m1, m2);
}

joystick.addEventListener('pointerdown', (e) => {
    dragging = true;
    handleMove(e.clientX, e.clientY);
});

window.addEventListener('pointermove', (e) => {

    if (!dragging) return;

    handleMove(e.clientX, e.clientY);
});

window.addEventListener('pointerup', () => {

    dragging = false;
    stopAll();
});

async function updateStatus() {

    try {

        const res = await fetch('/quickstatus');
        const data = await res.json();

        document.getElementById('battery').innerText =
            data.vIn.toFixed(2) + 'V';

        document.getElementById('temp').innerText =
            data.temperature.toFixed(1) + '°C';

        if (data.vIn > 4.5) {
            document.getElementById('charge').innerText =
                '⚡ Charging';
        } else {
            document.getElementById('charge').innerText =
                '🔋 Battery';
        }

    } catch (e) {

        console.log(e);
    }
}

updateStatus();

setInterval(updateStatus, 3000);

</script>

</body>
</html>
