<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0F1115"></rect>

  <!-- Gear outer ring -->
  <g fill="none" stroke="#00C853" stroke-width="18" stroke-linecap="round">

    <!-- Gear teeth (simple stylised) -->
    <path d="M256 70 L256 30"></path>
    <path d="M256 482 L256 442"></path>
    <path d="M70 256 L30 256"></path>
    <path d="M482 256 L442 256"></path>

    <path d="M120 120 L95 95"></path>
    <path d="M392 392 L417 417"></path>
    <path d="M392 120 L417 95"></path>
    <path d="M120 392 L95 417"></path>

    <!-- Main gear circle -->
    <circle cx="256" cy="256" r="180"></circle>

    <!-- Inner ring -->
    <circle cx="256" cy="256" r="110" opacity="0.6"></circle>

  </g>

  <!-- Circuit K -->
  <g stroke="#00C853" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="none">

    <!-- Vertical spine -->
    <path d="M200 140 L200 372"></path>

    <!-- Upper arm -->
    <path d="M200 250 L310 160"></path>

    <!-- Lower arm -->
    <path d="M200 250 L320 360"></path>

  </g>

  <!-- Circuit nodes -->
  <g fill="#00C853">
    <circle cx="200" cy="250" r="10"></circle>
    <circle cx="310" cy="160" r="10"></circle>
    <circle cx="320" cy="360" r="10"></circle>
  </g>

</svg>